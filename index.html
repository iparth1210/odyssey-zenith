    <style>
      :root {
        --primary: #E5E7EB; /* Brushed Platinum */
        --accent: #D4AF37;  /* Sovereign Gold */
        --bg: #050A10;      /* Deep Obsidian */
        --card: rgba(10, 20, 30, 0.7);
        --border: rgba(212, 175, 55, 0.2);
        --text-platinum: #E5E7EB;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text-platinum);
        overflow: hidden;
        margin: 0;
        padding: 0;
        letter-spacing: -0.015em;
        background-image: 
          radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 0% 100%, rgba(30, 60, 90, 0.1) 0%, transparent 50%);
      }

      h1, h2, h3, h4, .font-display {
        font-family: 'Montserrat', sans-serif;
        letter-spacing: -0.04em;
        font-weight: 700;
        line-height: 1.1;
      }

      .glass-terminal {
        background: rgba(10, 15, 25, 0.85);
        backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid var(--border);
        box-shadow: 0 12px 64px 0 rgba(0, 0, 0, 0.9);
      }

      .gold-hairline {
        border: 1px solid rgba(212, 175, 55, 0.35);
      }

      .hover-institutional {
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hover-institutional:hover {
        transform: translateY(-6px);
        border-color: rgba(212, 175, 55, 0.7);
        background: rgba(212, 175, 55, 0.1);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.75), 0 0 40px rgba(212, 175, 55, 0.15);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
      ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.4); border-radius: 20px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

      .font-mono { font-family: 'JetBrains Mono', monospace; }

      .shimmer-gold {
        background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), transparent);
        background-size: 200% 100%;
        animation: shimmer 6s infinite linear;
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .katex { font-size: 1.1em; color: var(--accent); white-space: nowrap; }
      
      /* Fix for quirks mode error if injected in nested frames */
      .standards-check { display: none; }
